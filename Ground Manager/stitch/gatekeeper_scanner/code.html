<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gatekeeper Scanner - G Sports Universe</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#D4AF37", // Metallic Gold
                        "background-light": "#022B21", // Deep Satin Emerald
                        "background-dark": "#011a14",
                        "emerald-accent": "#034d3b",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .gold-border {
            border: 1px solid #D4AF37;
        }
        .scanner-viewport {
            background: linear-gradient(rgba(2, 43, 33, 0.4), rgba(2, 43, 33, 0.4)), url('https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
        }
        .viewfinder-corner {
            width: 40px;
            height: 40px;
            border-color: #D4AF37;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4 border-b border-primary/20 bg-background-light/95 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div>
<h1 class="text-lg font-bold tracking-tight text-white uppercase">Gatekeeper Scanner</h1>
<p class="text-xs text-primary font-medium tracking-widest uppercase">Institutional Hub</p>
</div>
</div>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-primary">settings</span>
</button>
</header>
<!-- Main Content Area / Scanner Viewport -->
<main class="flex-1 relative flex flex-col items-center justify-center p-6 overflow-hidden">
<!-- Background/Camera Placeholder -->
<div class="absolute inset-0 scanner-viewport opacity-40" data-alt="Abstract camera viewfinder showing a digital sports arena background"></div>
<!-- Scanner Overlay -->
<div class="relative w-full max-w-sm aspect-square flex items-center justify-center">
<!-- Viewfinder Brackets -->
<div class="absolute top-0 left-0 viewfinder-corner border-t-4 border-l-4 rounded-tl-xl"></div>
<div class="absolute top-0 right-0 viewfinder-corner border-t-4 border-r-4 rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 viewfinder-corner border-b-4 border-l-4 rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 viewfinder-corner border-b-4 border-r-4 rounded-br-xl"></div>
<!-- Central Scanning Line (Static representation) -->
<div class="w-full h-0.5 bg-primary/50 shadow-[0_0_15px_rgba(212,175,55,0.8)]"></div>
<div class="text-center z-10">
<p class="text-primary text-sm font-medium tracking-[0.2em] uppercase drop-shadow-md">Align QR Code</p>
</div>
</div>
<!-- Scanning Controls -->
<div class="mt-12 flex items-center gap-12 z-20">
<div class="flex flex-col items-center gap-2">
<button class="w-14 h-14 rounded-full border border-primary/30 bg-background-light/40 flex items-center justify-center hover:bg-primary/20 transition-all">
<span class="material-symbols-outlined text-white text-3xl">flash_on</span>
</button>
<span class="text-[10px] text-primary uppercase tracking-widest font-bold">Flash</span>
</div>
<div class="flex flex-col items-center gap-2">
<button class="w-14 h-14 rounded-full border border-primary/30 bg-background-light/40 flex items-center justify-center hover:bg-primary/20 transition-all">
<span class="material-symbols-outlined text-white text-3xl">flashlight_on</span>
</button>
<span class="text-[10px] text-primary uppercase tracking-widest font-bold">Torch</span>
</div>
</div>
<!-- Instructions -->
<div class="mt-auto mb-8 text-center z-20">
<p class="text-slate-300 text-sm font-light tracking-wide italic">"Point at QR to scan"</p>
</div>
</main>
<!-- Bottom Actions & Navigation -->
<footer class="bg-background-light border-t border-primary/20 px-6 py-6 flex flex-col gap-6">
<!-- Manual Entry Button -->
<div class="flex justify-center">
<button class="gold-border px-10 py-3 rounded-full bg-transparent text-primary text-sm font-bold uppercase tracking-widest hover:bg-primary hover:text-background-light transition-all duration-300">
                Manual Entry
            </button>
</div>
<!-- Navigation Bar (Modified from Components) -->
<nav class="flex justify-around items-center pt-2">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-2xl">dashboard</span>
<span class="text-[10px] uppercase font-bold tracking-tighter">Stats</span>
</a>
<a class="flex flex-col items-center gap-1 text-white border-t-2 border-primary pt-1" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">qr_code_scanner</span>
<span class="text-[10px] uppercase font-bold tracking-tighter">Scan</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary/60" href="#">
<span class="material-symbols-outlined text-2xl">history</span>
<span class="text-[10px] uppercase font-bold tracking-tighter">Logs</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary/60" href="#">
<span class="material-symbols-outlined text-2xl">group</span>
<span class="text-[10px] uppercase font-bold tracking-tighter">Staff</span>
</a>
</nav>
</footer>
<!-- Decorative Corner Accents -->
<div class="fixed top-2 left-2 w-8 h-8 border-t border-l border-primary/40 pointer-events-none"></div>
<div class="fixed top-2 right-2 w-8 h-8 border-t border-r border-primary/40 pointer-events-none"></div>
<div class="fixed bottom-2 left-2 w-8 h-8 border-b border-l border-primary/40 pointer-events-none"></div>
<div class="fixed bottom-2 right-2 w-8 h-8 border-b border-r border-primary/40 pointer-events-none"></div>
</body></html>
