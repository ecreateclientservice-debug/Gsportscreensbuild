<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>G Sports Universe Heritage Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13", // Theme requirement
                        "satin-emerald": "#043927",
                        "metallic-gold": "#D4AF37",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0a0f0d", // Darker for high contrast emerald/gold
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .gold-outline {
            outline: 1px solid #D4AF37;
        }
        .emerald-gradient {
            background: linear-gradient(135deg, #043927 0%, #065a3d 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-metallic-gold/30 justify-between">
<div class="flex size-10 items-center justify-center rounded-full border border-metallic-gold/50 text-metallic-gold">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<div class="text-center">
<h2 class="text-lg font-bold leading-tight tracking-tight text-slate-900 dark:text-slate-100">Heritage Hub</h2>
<p class="text-[10px] uppercase tracking-widest text-metallic-gold font-semibold">G Sports Universe</p>
</div>
<div class="flex size-10 items-center justify-center rounded-full border border-metallic-gold/50 text-metallic-gold">
<span class="material-symbols-outlined">info</span>
</div>
</div>
<!-- Search & Filters -->
<div class="px-4 py-4 space-y-3 bg-background-light dark:bg-background-dark/50">
<label class="flex flex-col w-full">
<div class="flex w-full items-stretch rounded-xl h-12 bg-emerald-900/20 border border-metallic-gold/30">
<div class="flex items-center justify-center pl-4 text-metallic-gold">
<span class="material-symbols-outlined">search</span>
</div>
<input class="form-input flex-1 border-none bg-transparent focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-500 dark:placeholder:text-emerald-700/50 text-sm" placeholder="Search sports grounds..." value=""/>
</div>
</label>
<div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-satin-emerald px-4 border border-metallic-gold/40">
<span class="text-metallic-gold text-xs font-semibold uppercase">Near Me</span>
<span class="material-symbols-outlined text-metallic-gold text-sm">expand_more</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-emerald-950/40 px-4 border border-metallic-gold/20">
<span class="text-slate-400 text-xs font-semibold uppercase">Open Now</span>
<span class="material-symbols-outlined text-slate-400 text-sm">expand_more</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-emerald-950/40 px-4 border border-metallic-gold/20">
<span class="text-slate-400 text-xs font-semibold uppercase">Ground Type</span>
<span class="material-symbols-outlined text-slate-400 text-sm">expand_more</span>
</button>
</div>
</div>
<!-- Map Main View -->
<div class="relative flex-1 bg-slate-200 dark:bg-emerald-950/10">

<div class="absolute inset-0 z-0 grayscale invert dark:invert-0 dark:opacity-40" data-alt="Dark stylized topo map of city streets" data-location="London" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAW7MMTqEpv0p3nqHj_9Ubrt3Jd6LZiiJ70KY985mL0unxVtCG5pAQXohUtm4015b7o3OejhlyRPQSQxcpo19dzr9jb_W0uTAI3XIIhtz4_PpwAOtZrDvva8y_tY6pK6dwh9L0rD1-_dKxHqRlFcBlTuabwfRzHg9M9Gbftnh65K1Eg41XhuHcCl_PjsqXVX8C9IWddESFx5xH25F1gh0Pje5zabLydtPcbnh7lYQbyXODjgfCZS7NxsH9zg4_eFGKLqH6NlXcnbqA"); background-size: cover; background-position: center;'>
</div>
<!-- Map Markers -->
<div class="absolute top-1/4 left-1/3 z-10">
<div class="relative flex flex-col items-center">
<div class="bg-satin-emerald border border-metallic-gold p-1 rounded-lg shadow-lg shadow-black/50">
<div class="size-8 flex items-center justify-center text-metallic-gold">
<span class="material-symbols-outlined text-xl">package_2</span>
</div>
</div>
<div class="w-0.5 h-3 bg-metallic-gold"></div>
</div>
</div>
<div class="absolute bottom-1/3 right-1/4 z-10">
<div class="relative flex flex-col items-center">
<div class="bg-satin-emerald border border-metallic-gold p-1 rounded-lg shadow-lg shadow-black/50 scale-110">
<div class="size-8 flex items-center justify-center text-metallic-gold">
<span class="material-symbols-outlined text-xl">package_2</span>
</div>
</div>
<div class="w-0.5 h-3 bg-metallic-gold"></div>
</div>
</div>
<!-- Map Controls -->
<div class="absolute right-4 top-4 flex flex-col gap-2 z-20">
<button class="size-10 flex items-center justify-center rounded-lg bg-satin-emerald border border-metallic-gold/40 text-metallic-gold shadow-lg">
<span class="material-symbols-outlined">add</span>
</button>
<button class="size-10 flex items-center justify-center rounded-lg bg-satin-emerald border border-metallic-gold/40 text-metallic-gold shadow-lg">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="size-10 mt-4 flex items-center justify-center rounded-lg bg-primary border border-white/20 text-white shadow-lg">
<span class="material-symbols-outlined">near_me</span>
</button>
</div>
<!-- Selected Location Card (Overlay) -->
<div class="absolute bottom-6 left-4 right-4 z-20">
<div class="bg-satin-emerald border border-metallic-gold rounded-xl p-4 shadow-2xl flex gap-4 items-center">
<div class="size-16 rounded-lg overflow-hidden border border-metallic-gold/30 shrink-0">
<img class="h-full w-full object-cover" data-alt="Modern sports ground with bright lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAP9K8LuDrWP2UQO-fH91UPVZMZXaW5E2QD4HZdblDui0zoh4KWVE74WE8mvV-b2HyqOWPtSyTn2h8-56678x1pQjuauJ3w-hQxC_zHWsdr_1iU4Sxx9ojlxVEF7hbMKLCEfeGJrPPXG6DHbxVK774xNN0UR66by9lV0K_CBGaKd_u1pl2JBdn1EzbHy1ftWeywJ77xnhac8tgAPQ8puS9Su7bk5Ghoa9XJOQJHt4QGMKqUKpsK2_xnMQetgn7wGU0YN8LzuerkLCs"/>
</div>
<div class="flex-1">
<h4 class="text-metallic-gold font-bold text-sm">Wembley Heritage Box</h4>
<p class="text-emerald-100/70 text-xs">Stadium Way, London HA9 0WS</p>
<div class="flex items-center gap-2 mt-2">
<span class="text-[10px] bg-emerald-800 text-emerald-100 px-2 py-0.5 rounded border border-metallic-gold/20">OPEN UNTIL 10PM</span>
<span class="text-[10px] text-metallic-gold font-medium">1.2 miles away</span>
</div>
</div>
<button class="bg-primary text-white size-10 rounded-lg flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined">directions</span>
</button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="flex gap-2 border-t border-metallic-gold/30 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2 z-30">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px] fill-1">map</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-wider">Map</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px]">inventory_2</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-wider">Collection</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px]">volunteer_activism</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-wider">Donate</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[28px]">account_circle</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-wider">Profile</p>
</a>
</div>
</div>
</body></html>
